<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Kuisia</title>
    <link rel="stylesheet" href="auth-style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="icon" type="image/png" href="Kuisia_icon.png">
</head>
<body>

    <header class="auth-header">
        <div class="brand">Kuisia</div>
        <h3 style="color: #494D5F;">belajar dan seru-seruan bersama teman</h3>
    </header>
    

    <div class="auth-container">
        <div class="auth-box">
            <h2 id="auth-title">Selamat Datang Kembali</h2>
            <p id="auth-desc">Kelola kuis Anda dengan mudah dan efisien.</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label style="color: #8458B3;">Email</label>
                    <input type="email" id="email" placeholder="contoh@mail.com" required>
                </div>

                <div class="input-group">
                    <label style="color: #8458B3;">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div id="confirm-password-group" class="input-group hidden">
                    <label>Ulangi Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••">
                </div>

                <button type="submit" id="btn-auth" class="btn-primary">Masuk</button>
            </form>

            <div class="auth-footer">
                <p id="toggle-text" style="color: #494D5F;">Belum punya akun? <a href="#" id="toggle-auth">Daftar Sekarang</a></p>
            </div>
        </div>

        <footer class="auth-footer-bottom">
            <p>&copy;2026 Kuisia Platform. All Rights Reserved</p>
        </footer>

    </div>

    <script src="auth-script.js"></script>
</body>
</html>
